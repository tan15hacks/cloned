name: Validate Hearthvale

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: npm run check
      - name: Run world and cave smoke tests
        run: node tests/smoke.mjs
